<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop – BlindSurprise!</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f7f7f7;
        }

        header {
            background: #0077ff;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            transition: 0.2s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            border-radius: 10px;
        }

        .product-card h3 {
            margin: 10px 0 5px;
        }

        .price {
            font-size: 18px;
            font-weight: bold;
            color: #0077ff;
        }

        .view-btn {
            display: inline-block;
            margin-top: 10px;
            background: #0077ff;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            text-decoration: none;
        }

        .view-btn:hover {
            background: #005fcc;
        }
    </style>
</head>
<body>

<header>
    <h1>BlindSurprise! Shop</h1>
    <p>Choose your mystery blind bag</p>
</header>

<div class="container">
    <div id="product-grid" class="grid">
        <p>Loading products...</p>
    </div>
</div>

<script>
// Load products from API
fetch("/api/products")
    .then(res => res.json())
    .then(products => {
        const grid = document.getElementById("product-grid");
        grid.innerHTML = ""; // Clear loading text

        products.forEach(product => {
            const card = document.createElement("div");
            card.className = "product-card";

            card.innerHTML = `
                <img src="${product.images[0]}" alt="${product.name}">
                <h3>${product.name}</h3>
                <p class="price">$${product.price} AUD</p>
                <a class="view-btn" href="/product/${product.id}">View Product</a>
            `;

            grid.appendChild(card);
        });
    })
    .catch(() => {
        document.getElementById("product-grid").innerHTML =
            "<p>Failed to load products.</p>";
    });
</script>

</body>
</html>
