<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Shop — BlindSurprise!</title>
  <meta name="description" content="Browse the BlindSurprise! shop and discover unique mystery blind bags crafted with creativity and imagination.">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    header {
      background: #6a4df5;
      padding: 20px;
      text-align: center;
      color: white;
      font-size: 28px;
      font-weight: bold;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .product-card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
    }

    .product-card img {
      width: 100%;
      border-radius: 10px;
    }

    .product-card h3 {
      margin: 10px 0 5px;
    }

    .product-card p {
      color: #555;
      font-size: 14px;
    }

    .product-card button {
      margin-top: 10px;
      padding: 10px 15px;
      background: #6a4df5;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .product-card button:hover {
      background: #573cd8;
    }
  </style>
</head>

<body>

<header>
  Shop — BlindSurprise!
</header>

<div class="products" id="products"></div>

<script>
  async function loadProducts() {
    try {
      const res = await fetch("/api/products");
      const products = await res.json();

      const container = document.getElementById("products");
      container.innerHTML = "";

      products.forEach(product => {
        const card = document.createElement("div");
        card.className = "product-card";

        const img = product.images?.[0] || "/placeholder.png";

        card.innerHTML = `
          <img src="${img}" alt="${product.name}">
          <h3>${product.name}</h3>
          <p>${product.description}</p>
          <button onclick="window.location.href='/product/${product.id}'">View Product</button>
        `;

        container.appendChild(card);
      });

    } catch (err) {
      console.error("Failed to load products:", err);
      document.getElementById("products").innerHTML =
        "<p style='text-align:center;color:red;'>Failed to load products.</p>";
    }
  }

  loadProducts();
</script>

</body>
</html>
