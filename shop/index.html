<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BlindSurprise! Shop</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5ff;
      color: #222;
    }

    header {
      background: #6a5acd;
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 42px;
    }

    main {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      margin-top: 30px;
    }

    .product {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    .product h3 {
      margin: 15px 0 10px;
    }

    .product button {
      padding: 10px 20px;
      background: #6a5acd;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    .product button:hover {
      background: #5a4acb;
    }

    footer {
      margin-top: 60px;
      background: #eee;
      padding: 20px;
      text-align: center;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

<header>
  <h1>BlindSurprise! Shop</h1>
  <p>Discover our mystery products</p>
</header>

<main>
  <h2>Available Products</h2>

  <div id="product-grid" class="product-grid">
    <!-- Products will load here automatically -->
  </div>
</main>

<footer>
  © 2026 BlindSurprise! — All Rights Reserved<br>
  Created by E‑Pix® and Dojjwok (Liza) Wuol®
</footer>

<script>
  // Load products from API
  fetch("/api/products")
    .then(res => res.json())
    .then(products => {
      const grid = document.getElementById("product-grid");

      if (products.length === 0) {
        grid.innerHTML = "<p>No products available yet.</p>";
        return;
      }

      products.forEach(product => {
        const item = document.createElement("div");
        item.className = "product";

        item.innerHTML = `
          <img src="${product.image}" alt="${product.name}">
          <h3>${product.name}</h3>
          <p>${product.description}</p>
          <button onclick="alert('Product: ${product.name}')">View Product</button>
        `;

        grid.appendChild(item);
      });
    })
    .catch(err => {
      console.error("Error loading products:", err);
      document.getElementById("product-grid").innerHTML =
        "<p>Failed to load products.</p>";
    });
</script>

</body>
</html>
