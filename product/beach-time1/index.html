<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product – BlindSurprise!</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .product-header {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .product-header img {
            width: 300px;
            border-radius: 10px;
        }
        .price {
            font-size: 24px;
            font-weight: bold;
            color: #0077ff;
        }
        .back-btn {
            display: inline-block;
            background: #0077ff;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 18px;
            margin-top: 15px;
        }
        .back-btn:hover {
            background: #005fcc;
        }
    </style>
</head>
<body>

<div class="container" id="product-container">
    <h2>Loading product...</h2>
</div>

<script>
// Get product ID from URL path
const path = window.location.pathname.split("/");
const productId = path[path.length - 1]; // "beach-time1"

// Fetch product data
fetch("/api/products")
    .then(res => res.json())
    .then(products => {
        const product = products.find(p => p.id === productId);

        if (!product) {
            document.getElementById("product-container").innerHTML =
                "<h2>Product not found.</h2>";
            return;
        }

        document.title = product.name + " – BlindSurprise!";

        document.getElementById("product-container").innerHTML = `
            <div class="product-header">
                <img src="${product.images[0]}" alt="${product.name} front">
                <img src="${product.images[1]}" alt="${product.name} back">

                <div>
                    <h1>${product.name}</h1>
                    <p class="price">$${product.price} AUD</p>
                    <p>${product.description}</p>

                    <a href="/shop" class="back-btn">Back to Shop</a>
                </div>
            </div>
        `;
    });
</script>

</body>
</html>
